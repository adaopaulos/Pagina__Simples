<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teste</title>
    <style>
        *{
            box-sizing: border-box;
            padding: 0px;
            margin: 0px;
        }

        body{
            font:normal bold 16px arial;
            background-color: rgb(241, 241, 201);

        }

        header{
            background-color: rgba(3, 70, 116, 0.774);
            padding: 10px;
            margin-bottom: 2px;
        }
        
        main{
            padding: 10px;
            background-color: rgb(241, 219, 191);
            min-width: 320px;
            max-width: 700px;
            margin: auto;
            text-align: center;
        }

        img{
            display: block;
            width: 300px;
            height: 250px;
            margin: auto auto 20px;
        }

        footer{
            padding: 20px;
            background-color: rgba(3, 70, 116, 0.774);
            text-align: center;
            height: 36vh;
        }

        button{
            width: 300px;
            height: 30px;
            border-radius: 14px;
            transform: translateY(100px);
            margin-top: 10px;
            background-color:  rgb(241, 219, 191);
        }
    </style>
</head>
<body>
    <header>
        <h1>Site De Teste</h1>
    </header>
    <main>
        <section>
            <img src="image/fundo.jpeg" alt="por do sol">

          <h2>
            Bem Vindo ao meu site!
          </h2>

          <p>
            Este é o meu primeiro site de teste de capacidade <br>
            Apresentar e criar um site básico 
          </p>
        </section>
    </main>
    <footer>
        <button>Sobre Mim</button>
        <button>Contacto</button>
    </footer>
    
</body>
</html>
